<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inversion // Absolute Chromatic V28</title>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        :root { 
            --neon-g: #0f0; --neon-p: #f0f; --neon-b: #0ff; 
            --v3-glow: #00ffcc; --gold: #ffd700; --neon-y: #ffff00;
            --neon-r: #ff0033;
        }
        body { 
            margin: 0; background: #000; color: var(--neon-g); font-family: monospace; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* High-Contrast Unified Grid Overlay */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 25px 25px;
            pointer-events: none; z-index: 500;
        }

        .nav { 
            display: flex; background: #111; height: 60px; border-top: 1px solid var(--neon-g); 
            position: fixed; bottom: 0; width: 100%; z-index: 1000;
        }
        .nav button { 
            flex: 1; background: none; border: none; color: #555; 
            font-size: 8px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: all 0.2s;
            border-top: 3px solid transparent;
        }
        .nav button.active { 
            color: #fff; background: #1a1a1a; 
            border-top: 3px solid var(--neon-b);
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.3);
            text-shadow: 0 0 10px var(--neon-b);
        }

        .view { display: none; flex: 1; flex-direction: column; padding: 10px; padding-bottom: 70px; box-sizing: border-box; width: 100%; height: 100%; z-index: 10; }
        .view.active { display: flex; }

        canvas { background: #000; border: 1px solid #333; display: block; margin: auto; position: relative; }

        .hud { 
            display: flex; justify-content: space-between; font-size: 9px; 
            color: var(--neon-p); padding: 5px; width: 100%; 
            max-width: 440px; margin: 0 0 0 15px; z-index: 600; 
        }

        #log { font-size: 10px; color: var(--neon-b); white-space: pre-wrap; flex: 1; padding: 10px; background: #080808; overflow-y: scroll; border: 1px solid #111; }

        .museum-layout { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow: hidden; }
        .museum-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }
        .artifact-card { 
            border-left: 4px solid #333; background: #0a0a0a; padding: 10px; 
            margin-bottom: 4px; font-size: 9px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer;
        }
        .artifact-card.selected { border-color: var(--gold); background: #1a1a1a; }

        .reconstruction-pane { display: flex; gap: 10px; height: 140px; margin-top: 5px; }
        .recon-box { flex: 1; display: flex; flex-direction: column; }
        .recon-label { font-size: 8px; color: #666; text-align: center; margin-bottom: 2px; }

        .highlight { color: #ff0055; font-weight: bold; }
        .sim-count-box { color: var(--neon-b); font-weight: bold; border: 1px solid var(--neon-b); padding: 2px 5px; }

        .bmc-btn { 
            position: fixed; top: 10px; right: 10px; background: #ffdd00; 
            color: #000; padding: 5px 10px; font-size: 10px; font-weight: bold; 
            text-decoration: none; border-radius: 3px; z-index: 10000; opacity: 0.9; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <a href="http://buymeacoffee.com/brandonkennedy" target="_blank" class="bmc-btn">☕ TIP JAR</a>

    <div id="v-sim" class="view active">
        <div class="hud">
            <span>CHROMATIC_EYES_V28</span>
            <span class="sim-count-box">SIM_TOTAL: <span id="sim-count">0</span></span>
        </div>
        <canvas id="c-phys"></canvas>
    </div>

    <div id="v-lab" class="view">
        <div class="hud"><span>RULIAD_VIBRANT_BRAIN</span><span id="brain-rule" class="highlight">RULE: 0</span></div>
        <canvas id="c-brain"></canvas>
    </div>

    <div id="v-reality" class="view">
        <div class="hud"><span>QUADRATIC_REALITY_LENS</span><span id="reality-bot-info" class="highlight">TEAM_7_DATA_LENS</span></div>
        <canvas id="c-reality"></canvas>
    </div>

    <div id="v-museum" class="view">
        <div class="hud"><span>VAULT_ARCHEOLOGY</span><span class="highlight">SELECT_TO_RECONSTRUCT</span></div>
        <div class="museum-layout">
            <div class="museum-scroll" id="leaderboard-data"></div>
            <div class="reconstruction-pane">
                <div class="recon-box"><div class="recon-label">2D_PATH</div><canvas id="c-museum-2d"></canvas></div>
                <div class="recon-box"><div class="recon-label">3D_TOPOLOGY</div><canvas id="c-museum-3d"></canvas></div>
            </div>
        </div>
    </div>

    <div id="v-hyper" class="view"><div class="hud"><span>HYPERBOLIC_3D_MATRIX</span></div><canvas id="c-hyper"></canvas></div>
    <div id="v-zeta" class="view">
        <div class="hud"><span>ZETA_TASKFORCE: <span id="zeta-count" style="color:var(--gold)">0</span></span><span class="highlight">THRESHOLD: 0.5</span></div>
        <canvas id="c-zeta"></canvas>
    </div>
    <div id="v-analyze" class="view"><div id="log"></div></div>

    <nav class="nav">
        <button onclick="tab('sim')" id="b-sim" class="active">EYES</button>
        <button onclick="tab('lab')" id="b-lab">BRAIN</button>
        <button onclick="tab('reality')" id="b-reality">REALITY</button>
        <button onclick="tab('museum')" id="b-museum">MUSEUM</button>
        <button onclick="tab('hyper')" id="b-hyper">HYPER</button>
        <button onclick="tab('zeta')" id="b-zeta">ZETA</button>
        <button onclick="tab('analyze')">LOG</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- GLOBAL CONSTANTS ---
        const COLORS = { G: '#0f0', P: '#f0f', B: '#0ff', Y: '#ff0', W: '#fff', R: '#f03', GOLD: '#ffd700' };
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'inversion-v28-absolute';

        let user = null, globalMuseum = [], globalZeta = [], canvasSize = 500, selectedArtifact = null;
        let searchCount = 0;
        const gridRes = 30, ruliadRes = 100;
        const heatmap = Array.from({ length: gridRes }, () => Array(gridRes).fill(0));
        let ruliadGrid = Array.from({ length: ruliadRes }, () => Array(ruliadRes).fill(0));

        // --- TEAM 7 AGENTS ---
        const team7 = [
            { id: 0, name: "S_Alpha", color: '#00ff44', x: 250, y: 250, vx: 5, vy: 5.1234, trail: [], bounces: 0, range: [0.0001, 0.5], boredom: 0 },
            { id: 1, name: "S_Beta", color: '#00ccff', x: 250, y: 250, vx: 5, vy: 0.1234, trail: [], bounces: 0, range: [0.0001, 0.5], boredom: 0 },
            { id: 2, name: "S_Gamma", color: '#ffcc00', x: 250, y: 250, vx: 5, vy: 14.5678, trail: [], bounces: 0, range: [0.0001, 10], boredom: 0 },
            { id: 3, name: "S_Delta", color: '#ff4400', x: 250, y: 250, vx: 5, vy: 21.0982, trail: [], bounces: 0, range: [10, 25], boredom: 0 },
            { id: 4, name: "B_X", color: '#ff00ff', x: 250, y: 250, vx: 5, vy: 7.1239, trail: [], bounces: 0, range: [0.001, 35], boredom: 0 },
            { id: 5, name: "B_Y", color: '#00ffff', x: 250, y: 250, vx: 5, vy: 12.4456, trail: [], bounces: 0, range: [0.001, 35], boredom: 0 },
            { id: 6, name: "B_Z", color: '#ffffff', x: 250, y: 250, vx: 5, vy: 19.8873, trail: [], bounces: 0, range: [0.001, 35], boredom: 0 }
        ];

        // Zeta Taskforce using Agent Smith/Blade colors
        const zetaAgents = team7.map((b, i) => ({ 
            ...b, 
            t: (i < 4 ? 0.1 + (i * 3.5) : 14.13 + (i * 15)), // Smiths Alpha-Delta hardcoded to low regime
            mag: 1, locked: false, confirmations: 0 
        }));

        // --- AUTH & DATA ---
        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (!user) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } else {
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'museum'), snap => {
                    globalMuseum = snap.docs.map(d => d.data());
                    const el = document.getElementById('sim-count'); if(el) el.innerText = globalMuseum.length;
                    if (document.getElementById('v-museum').classList.contains('active')) updateMuseumUI();
                });
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'zeta_zeros'), snap => {
                    globalZeta = snap.docs.map(d => d.data());
                    const el = document.getElementById('zeta-count'); if(el) el.innerText = globalZeta.length;
                });
            }
        });

        // --- NOVELTY ENGINE ---
        function getNovelVy(bot) {
            let candidate; let attempts = 0; const epsilon = 0.00001; 
            while(attempts < 100) {
                candidate = bot.range[0] + Math.random() * (bot.range[1] - bot.range[0]);
                if (!globalMuseum.some(m => Math.abs(parseFloat(m.vy) - candidate) < epsilon)) {
                    searchCount++; updateLog(`NOVEL_SYNC_${searchCount}: Vy=${candidate.toFixed(6)}`);
                    return candidate;
                }
                attempts++;
            }
            return candidate;
        }

        async function logArtifact(node) {
            if (!user) return;
            const isStructure = node.precision < 0.05;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'museum'), {
                    ...node, shape: isStructure ? (node.winding % 2 === 0 ? "RECTANGLE" : "DIAMOND") : "ASYMMETRIC", 
                    classification: isStructure ? "STRUCTURE" : "RANDOMNESS", timestamp: Date.now(), userId: user.uid
                });
            } catch (e) {}
        }

        async function logZeta(tValue) {
            if (!user) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'zeta_zeros'), {
                    t: tValue, timestamp: Date.now(), userId: user.uid
                });
                updateLog(`ZETA_ZERO: Locked at t=${tValue.toFixed(6)}`);
            } catch (e) {}
        }

        // --- UI ---
        function resizeUI() {
            canvasSize = Math.min(window.innerHeight - 180, window.innerWidth - 40, 500);
            ['c-phys','c-reality','c-hyper','c-zeta','c-brain'].forEach(id => {
                const c = document.getElementById(id); if(c) { c.width = canvasSize; c.height = canvasSize; }
            });
            const c2d = document.getElementById('c-museum-2d'), c3d = document.getElementById('c-museum-3d');
            if(c2d) { c2d.width = 180; c2d.height = 130; }
            if(c3d) { c3d.width = 180; c3d.height = 130; }
        }
        window.addEventListener('resize', resizeUI);

        window.tab = (t) => {
            document.querySelectorAll('.view, .nav button').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('v-' + t), btn = document.getElementById('b-' + t);
            if(target) target.classList.add('active'); if(btn) btn.classList.add('active');
            if(t === 'museum') updateMuseumUI();
        };

        const updateLog = m => { const l = document.getElementById('log'); if(l) { l.innerHTML += `> ${m}\n`; l.scrollTop = l.scrollHeight; } };

        const updateMuseumUI = () => {
            const container = document.getElementById('leaderboard-data'); if(!container) return;
            const sorted = [...globalMuseum].sort((a,b) => b.timestamp - a.timestamp).slice(0, 15);
            container.innerHTML = sorted.map(m => `
                <div class="artifact-card ${selectedArtifact?.timestamp === m.timestamp ? 'selected' : ''}" 
                     onclick="window.selectArtifact('${m.timestamp}')">
                    <div><b style="color:var(--neon-b)">${m.shape}</b> [${m.botName}]<br><small>Δ:${m.precision?.toFixed(5)} | Vy:${parseFloat(m.vy).toFixed(5)}</small></div>
                    <div style="color:${m.classification === 'STRUCTURE' ? 'var(--gold)' : 'var(--neon-p)'}">${m.classification}</div>
                </div>
            `).join('');
        };

        window.selectArtifact = (ts) => {
            selectedArtifact = globalMuseum.find(m => m.timestamp.toString() === ts);
            updateMuseumUI();
        };

        // --- ENGINES ---
        function runV28() {
            const ctxPhys = document.getElementById('c-phys')?.getContext('2d');
            if(ctxPhys) {
                ctxPhys.fillStyle = 'rgba(0,0,0,0.2)'; ctxPhys.fillRect(0,0,canvasSize,canvasSize);
                const cellS = canvasSize / gridRes;
                for(let i=0; i<gridRes; i++) for(let j=0; j<gridRes; j++) {
                    if(heatmap[i][j] > 0) {
                        ctxPhys.fillStyle = `rgba(255, 69, 0, ${heatmap[i][j] * 0.4})`;
                        ctxPhys.fillRect(i*cellS, j*cellS, cellS, cellS); heatmap[i][j] *= 0.98;
                    }
                }
            }

            team7.forEach(bot => {
                for(let s=0; s<15; s++) {
                    bot.x += bot.vx; bot.y += bot.vy;
                    const gx = Math.floor(bot.x / (500/gridRes)), gy = Math.floor(bot.y / (500/gridRes));
                    if(gx>=0 && gx<gridRes && gy>=0 && gy<gridRes) heatmap[gx][gy] = Math.min(1.0, heatmap[gx][gy] + 0.05);

                    let hitX = (bot.x<=0 || bot.x>=500), hitY = (bot.y<=0 || bot.y>=500);
                    if(hitX) { bot.vx*=-1; bot.x = bot.x<=0?0:500; bot.bounces++; }
                    if(hitY) { bot.vy*=-1; bot.y = bot.y<=0?0:500; bot.bounces++; }

                    if(hitX && hitY) {
                        const tx = bot.x < 250 ? 0 : 500, ty = bot.y < 250 ? 0 : 500;
                        const prec = Math.sqrt(Math.pow(bot.x-tx,2) + Math.pow(bot.y-ty,2));
                        if(prec < 0.1) logArtifact({ vy: bot.vy, botName: bot.name, winding: Math.floor(bot.bounces/2), precision: prec });
                    }

                    if(s % 5 === 0) { bot.trail.push({x: bot.x, y: bot.y}); if(bot.trail.length > 60) bot.trail.shift(); }

                    if(bot.bounces >= 800) {
                        bot.vy = getNovelVy(bot);
                        bot.x = 250; bot.y = 250; bot.bounces = 0;
                    }
                }

                if(ctxPhys && document.getElementById('v-sim').classList.contains('active')) {
                    ctxPhys.beginPath(); ctxPhys.strokeStyle = bot.color; ctxPhys.lineWidth = 1.8;
                    bot.trail.forEach((p, idx) => { 
                        ctxPhys.globalAlpha = (idx / bot.trail.length) * 0.9;
                        ctxPhys.lineTo(p.x * (canvasSize/500), p.y * (canvasSize/500)); 
                    });
                    ctxPhys.stroke(); ctxPhys.globalAlpha = 1.0;
                    ctxPhys.fillStyle = bot.color; ctxPhys.shadowBlur = 15; ctxPhys.shadowColor = bot.color;
                    ctxPhys.beginPath(); ctxPhys.arc(bot.x*(canvasSize/500), bot.y*(canvasSize/500), 4, 0, Math.PI*2); ctxPhys.fill();
                    ctxPhys.shadowBlur = 0;
                }
            });

            if(document.getElementById('v-lab').classList.contains('active')) renderBrain();
            if(document.getElementById('v-reality').classList.contains('active')) renderRealityQuadrants();
            if(document.getElementById('v-hyper').classList.contains('active')) renderHyper();
            if(document.getElementById('v-zeta').classList.contains('active')) runZetaLogic();
            if(document.getElementById('v-museum').classList.contains('active')) renderMuseumRecon();

            requestAnimationFrame(runV28);
        }

        function renderRealityQuadrants() {
            const ctx = document.getElementById('c-reality')?.getContext('2d'); if(!ctx) return;
            const h = canvasSize / 2; ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvasSize,canvasSize);
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)'; ctx.beginPath(); ctx.moveTo(h,0); ctx.lineTo(h,canvasSize); ctx.moveTo(0,h); ctx.lineTo(canvasSize,h); ctx.stroke();

            const infoEl = document.getElementById('reality-bot-info');
            if(infoEl) infoEl.innerText = ` Vy: ${team7[0].vy.toFixed(6)}`;

            team7.forEach(b => {
                ctx.fillStyle = b.color; ctx.fillRect(b.x*(h/500)-1.5, b.y*(h/500)-1.5, 3, 3);
                ctx.save(); ctx.translate(h, 0); 
                ctx.beginPath(); ctx.strokeStyle = b.color;
                b.trail.forEach((p, i) => {
                    ctx.globalAlpha = (i / b.trail.length) * 0.6;
                    const px = (p.x/500)*h, py = (p.y/500)*(h/2);
                    if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke(); ctx.globalAlpha = 1.0;
                ctx.strokeStyle = COLORS.GOLD; ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(h/2, h); ctx.lineTo((b.x/500)*h, (b.y/500)*(h/2)); ctx.stroke();
                ctx.restore();
                ctx.save(); ctx.translate(0, h);
                let nx=(b.x-250)/250, ny=(b.y-250)/250, mag=Math.min(0.98, Math.sqrt(nx*nx+ny*ny)), fac=Math.atanh(mag)/mag;
                ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(nx*fac*25+h/2, ny*fac*25+h/2, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });

            ctx.save(); ctx.translate(h, h); const rule = Math.floor(team7[0].vy*100)%256;
            for(let i=0; i<10; i++) for(let j=0; j<10; j++) if((rule >> (i+j)%8)&1) { 
                ctx.fillStyle=`hsla(${(rule+i*10)%360},90%,55%,0.6)`; 
                ctx.fillRect(i*(h/10), j*(h/10), h/12, h/12); 
            }
            ctx.restore();
        }

        function runZetaLogic() {
            const ctx = document.getElementById('c-zeta')?.getContext('2d'); if(!ctx) return;
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,canvasSize,canvasSize);
            zetaAgents.forEach(z => {
                const m1 = Math.abs(Math.sin(z.t) + Math.sin(z.t * Math.E) + Math.cos(z.t * Math.PI) * 0.4);
                const m2 = Math.abs(Math.sin(z.t + 0.0001) + Math.sin((z.t + 0.0001) * Math.E));
                const grad = (m2 - m1) / 0.0001;
                const detectionIntensity = m1 < 0.5 ? 1.0 : 0.2;
                const nearLogged = globalZeta.some(gz => Math.abs(gz.t - z.t) < 0.1);
                if(nearLogged && !z.locked) { z.t += (z.type === 'smith' ? 0.2 : 5.0); return; }
                z.t -= grad * (z.locked ? 0.0002 : 0.035) * detectionIntensity;
                if (m1 < 0.005 && Math.abs(grad) < 0.001) { 
                    z.confirmations++; 
                    if(z.confirmations > 100) { logZeta(z.t); z.t += (z.type === 'smith' ? 0.5 : 20) + Math.random() * 5; z.locked = false; z.confirmations = 0; } 
                } else { z.locked = false; }
                ctx.fillStyle = z.color; ctx.shadowBlur = 15; ctx.shadowColor = z.color;
                const x = (z.id * (canvasSize/7)) + (canvasSize/14), y = canvasSize - (m1 * canvasSize * 0.85) - 40;
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            });
        }

        function renderBrain() {
            const ctx = document.getElementById('c-brain')?.getContext('2d'); if(!ctx) return;
            const cS = canvasSize / ruliadRes;
            const rule = Math.floor(team7[0].vy * 100) % 256;
            document.getElementById('brain-rule').innerText = `RULE: ${rule} | LEAD: S_ALPHA`;
            const nextRow = new Array(ruliadRes).fill(0);
            for(let i=0; i<ruliadRes; i++) {
                const pat = (ruliadGrid[0][(i-1+ruliadRes)%ruliadRes]<<2)|(ruliadGrid[0][i]<<1)|ruliadGrid[0][(i+1)%ruliadRes];
                if((rule >> pat) & 1) nextRow[i] = 1;
            }
            ruliadGrid.unshift(nextRow); ruliadGrid.pop();
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvasSize,canvasSize);
            ruliadGrid.forEach((row, y) => row.forEach((c, x) => {
                if(c) { 
                    const hue = (x / ruliadRes) * 360 + (y / ruliadRes) * 80;
                    ctx.fillStyle = `hsl(${hue % 360}, 100%, 55%)`; ctx.fillRect(x*cS, y*cS, cS, cS); 
                }
            }));
            team7.forEach(b => {
                ctx.fillStyle = b.color; ctx.shadowBlur = 25; ctx.shadowColor = b.color;
                ctx.beginPath(); ctx.arc(b.x*(canvasSize/500), b.y*(canvasSize/500), 5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            });
        }

        function renderMuseumRecon() {
            if(!selectedArtifact) return;
            const c2d = document.getElementById('c-museum-2d')?.getContext('2d'), c3d = document.getElementById('c-museum-3d')?.getContext('2d');
            if(!c2d || !c3d) return;
            const vy = parseFloat(selectedArtifact.vy), t = Date.now() * 0.001;
            c2d.fillStyle = '#000'; c2d.fillRect(0,0,180,130); c2d.strokeStyle = COLORS.G; c2d.beginPath();
            let x=90, y=65, vx=3, vyv=vy/2;
            for(let i=0; i<100; i++) { x+=vx; y+=vyv; if(x<=0||x>=180)vx*=-1; if(y<=0||y>=130)vyv*=-1; c2d.lineTo(x,y); } c2d.stroke();
            c3d.fillStyle = '#000'; c3d.fillRect(0,0,180,130); c3d.strokeStyle = COLORS.GOLD; c3d.beginPath();
            let ax=90, ay=65, avx=3, avy=vy/2;
            for(let i=0; i<150; i++) { ax+=avx; ay+=avy; if(ax<=0||ax>=180)avx*=-1; if(ay<=0||ay>=130)avy*=-1; const s=1+Math.sin(i*0.05+t)*0.2; c3d.lineTo(90+(ax-90)*s, 65+(ay-65)*s); } c3d.stroke();
        }

        function renderHyper() {
            const ctx = document.getElementById('c-hyper')?.getContext('2d'); if(!ctx) return;
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvasSize,canvasSize);
            const t = Date.now() * 0.0005;
            team7.forEach(b => {
                const bx=(b.x-250)*Math.cos(t), by=(b.y-250)*Math.sin(t);
                ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(canvasSize/2+bx, canvasSize/2+by, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.strokeStyle = b.color; ctx.globalAlpha = 0.3;
                b.trail.forEach(p => ctx.lineTo(canvasSize/2+(p.x-250)*Math.cos(t), canvasSize/2+(p.y-250)*Math.sin(t)));
                ctx.stroke(); ctx.globalAlpha = 1;
            });
        }

        window.onload = () => { resizeUI(); ruliadGrid[0][ruliadRes/2]=1; runV28(); updateLog("SYSTEM_V28_ACTIVE."); };
        window.tab = tab; window.selectArtifact = selectArtifact;
    </script>
